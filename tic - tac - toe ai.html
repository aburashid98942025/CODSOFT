<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tic Tac Toe</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {

            width: 100%;
            min-height: 100vh;

            overflow: hidden;

            background:
                linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
                url('993c2a91-0c67-48e5-a54e-f3b6b0855652.png');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
        }

        .overlay {

            width: 100%;
            min-height: 100vh;

            background: linear-gradient(90deg,
                    rgba(0, 0, 0, 0.85),
                    rgba(0, 0, 0, 0.35),
                    rgba(0, 0, 0, 0.85));

            display: flex;
            flex-direction: column;

            align-items: center;
        }

        .navbar {

            width: 100%;
            padding: 25px 80px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            position: absolute;
            top: 0;
            left: 0;

            z-index: 100;
        }

        .logo {

            font-size: 30px;
            font-weight: 900;

            color: #ff004c;

            letter-spacing: 5px;

            text-shadow:
                0 0 10px #ff004c,
                0 0 25px #ff004c;
        }

        .nav-links {

            display: flex;
            gap: 40px;
        }

        .nav-links a {

            color: white;
            text-decoration: none;

            font-size: 15px;
            font-weight: 600;

            transition: 0.3s;
        }

        .nav-links a:hover {

            color: #00f7ff;

            text-shadow: 0 0 10px #00f7ff;
        }

        .hero {

            width: 100%;
            height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;

            position: relative;
        }

        .tag {

            color: #ff004c;

            letter-spacing: 8px;

            font-size: 18px;

            margin-bottom: 20px;

            text-shadow:
                0 0 10px #ff004c;
        }

        h1 {

            font-size: 95px;
            line-height: 105px;

            text-transform: uppercase;

            margin-bottom: 25px;

            color: white;

            text-shadow:
                0 0 15px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 255, 255, 0.45);
        }

        .subtitle {

            font-size: 20px;

            color: #d1d5db;

            margin-bottom: 35px;
        }

        .play-btn {

            padding: 18px 45px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(135deg, #ff003c, #ff4d00);

            color: white;

            font-size: 18px;
            font-weight: 700;

            cursor: pointer;

            transition: 0.35s;

            letter-spacing: 2px;

            box-shadow:
                0 0 20px rgba(255, 0, 76, 0.35);
        }

        .play-btn:hover {

            transform: translateY(-5px) scale(1.05);

            box-shadow:
                0 0 25px rgba(255, 0, 76, 0.55),
                0 0 60px rgba(255, 0, 76, 0.35);
        }

        .game-section {

            width: 100%;

            display: flex;
            justify-content: center;

            padding-bottom: 80px;
        }

        .game-box {

            width: 520px;

            padding: 35px;

            border-radius: 30px;

            background: rgba(0, 0, 0, 0.45);

            backdrop-filter: blur(12px);

            border: 1px solid rgba(255, 255, 255, 0.1);

            box-shadow:
                0 0 40px rgba(0, 247, 255, 0.12);

            text-align: center;
        }

        .status {

            font-size: 26px;
            font-weight: 700;

            color: #00f7ff;

            margin-bottom: 30px;

            text-shadow:
                0 0 10px #00f7ff;
        }

        .board {

            display: grid;

            grid-template-columns: repeat(3, 130px);

            gap: 15px;

            justify-content: center;

            margin-bottom: 30px;
        }

        .cell {

            width: 130px;
            height: 130px;

            border-radius: 24px;

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.12);

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 60px;
            font-weight: 900;

            cursor: pointer;

            transition: 0.35s;

            backdrop-filter: blur(10px);
        }

        .cell:hover {

            transform: translateY(-6px) scale(1.04);

            background: rgba(255, 255, 255, 0.15);

            box-shadow:
                0 0 20px rgba(0, 247, 255, 0.25);
        }

        .cell.x {

            color: #00f7ff;

            text-shadow:
                0 0 10px #00f7ff,
                0 0 25px #00f7ff;
        }

        .cell.o {

            color: #ff0055;

            text-shadow:
                0 0 10px #ff0055,
                0 0 25px #ff0055;
        }

        .winning {

            background: linear-gradient(135deg, #00e5ff, #0066ff) !important;

            animation: pulse 1s infinite;

            color: white !important;
        }

        @keyframes pulse {

            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }

        }

        .controls {

            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {

            padding: 15px 25px;

            border: none;
            border-radius: 14px;

            cursor: pointer;

            font-size: 15px;
            font-weight: 700;

            transition: 0.35s;

            letter-spacing: 1px;
        }

        #restartBtn {

            background: linear-gradient(135deg, #ff003c, #ff4d00);

            color: white;
        }

        #newGameBtn {

            background: linear-gradient(135deg, #00d9ff, #0066ff);

            color: white;
        }

        button:hover {

            transform: translateY(-4px);

            box-shadow:
                0 0 20px rgba(255, 255, 255, 0.2);
        }

        .footer {

            margin-top: 25px;

            font-size: 12px;

            letter-spacing: 3px;

            color: #d1d5db;
        }

        @media(max-width:768px) {

            .navbar {

                padding: 20px;
            }

            .nav-links {

                display: none;
            }

            h1 {

                font-size: 55px;
                line-height: 65px;
            }

            .subtitle {

                font-size: 15px;
            }

            .game-box {

                width: 95%;
                padding: 25px;
            }

            .board {

                grid-template-columns: repeat(3, 95px);
            }

            .cell {

                width: 95px;
                height: 95px;

                font-size: 45px;
            }

        }
    </style>
</head>

<body>

    <div class="overlay">
        <div class="navbar">

            <div class="logo">
                AI GAME
            </div>
        </div>
        <div class="hero">

            <div class="tag">
                NEXT GEN AI GAME
            </div>

            <h1>
                Enjoy Your<br>Game
            </h1>

            <div class="subtitle">
                Play Against The Unbeatable AI Experience
            </div>

            <button class="play-btn"
                onclick="document.querySelector('.game-section').scrollIntoView({behavior:'smooth'})">

                PLAY NOW

            </button>

        </div>


        <div class="game-section">

            <div class="game-box">

                <div class="status" id="status">
                    Your Turn (X)
                </div>

                <div class="board">

                    <div class="cell" data-index="0"></div>
                    <div class="cell" data-index="1"></div>
                    <div class="cell" data-index="2"></div>

                    <div class="cell" data-index="3"></div>
                    <div class="cell" data-index="4"></div>
                    <div class="cell" data-index="5"></div>

                    <div class="cell" data-index="6"></div>
                    <div class="cell" data-index="7"></div>
                    <div class="cell" data-index="8"></div>

                </div>

                <div class="controls">

                    <button id="restartBtn">
                        Restart
                    </button>

                    <button id="newGameBtn">
                        New Game
                    </button>

                </div>

                <div class="footer">
                    CREATED WITH HTML CSS & JAVASCRIPT
                </div>

            </div>

        </div>

    </div>

    <script>

        const HUMAN = 'X';
        const AI = 'O';

        const WINNING_COMBINATIONS = [

            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]

        ];

        let boardState = Array(9).fill(null);

        let currentPlayer = HUMAN;

        let isGameActive = true;

        const cells = document.querySelectorAll('.cell');

        const statusDisplay = document.getElementById('status');

        const restartBtn = document.getElementById('restartBtn');

        const newGameBtn = document.getElementById('newGameBtn');

        cells.forEach(cell => {

            cell.addEventListener('click', handleCellClick);

        });

        restartBtn.addEventListener('click', restartGame);

        newGameBtn.addEventListener('click', restartGame);

        function handleCellClick(event) {

            const cell = event.target;

            const cellIndex = parseInt(cell.getAttribute('data-index'));

            if (boardState[cellIndex] !== null || !isGameActive || currentPlayer !== HUMAN) {

                return;
            }

            makeMove(cellIndex, HUMAN);

            if (checkGameEnd()) return;

            currentPlayer = AI;

            statusDisplay.textContent = 'AI Thinking...';

            setTimeout(() => {

                const bestMove = getBestMove();

                makeMove(bestMove, AI);

                checkGameEnd();

            }, 500);

        }

        function makeMove(index, player) {

            boardState[index] = player;

            const cell = cells[index];

            cell.textContent = player;

            cell.classList.add(player.toLowerCase(), 'taken');

        }

        function checkGameEnd() {

            const winner = getWinner();

            if (winner) {

                endGame(winner);

                return true;
            }

            if (isBoardFull()) {

                endGame('draw');

                return true;
            }

            currentPlayer = currentPlayer === HUMAN ? AI : HUMAN;

            if (currentPlayer === HUMAN) {

                statusDisplay.textContent = 'Your Turn (X)';
            }

            return false;
        }

        function endGame(winner) {

            isGameActive = false;

            if (winner === 'draw') {

                statusDisplay.textContent = "It's a Draw!";
            }

            else if (winner === HUMAN) {

                statusDisplay.textContent = 'You Won!';
            }

            else {

                statusDisplay.textContent = 'AI Wins!';
            }

        }

        function getWinner() {

            for (const combo of WINNING_COMBINATIONS) {

                const [a, b, c] = combo;

                if (

                    boardState[a] &&
                    boardState[a] === boardState[b] &&
                    boardState[a] === boardState[c]

                ) {

                    combo.forEach(index => {

                        cells[index].classList.add('winning');

                    });

                    return boardState[a];
                }

            }

            return null;
        }

        function isBoardFull() {

            return boardState.every(cell => cell !== null);
        }

        function minimax(board, depth, isMaximizing) {

            const result = checkTerminalState();

            if (result !== null) {

                return result;
            }

            if (isMaximizing) {

                let bestScore = -Infinity;

                for (let i = 0; i < board.length; i++) {

                    if (board[i] === null) {

                        board[i] = AI;

                        let score = minimax(board, depth + 1, false);

                        board[i] = null;

                        bestScore = Math.max(score, bestScore);
                    }

                }

                return bestScore;

            } else {

                let bestScore = Infinity;

                for (let i = 0; i < board.length; i++) {

                    if (board[i] === null) {

                        board[i] = HUMAN;

                        let score = minimax(board, depth + 1, true);

                        board[i] = null;

                        bestScore = Math.min(score, bestScore);
                    }

                }

                return bestScore;
            }

        }

        function checkTerminalState() {

            for (const combo of WINNING_COMBINATIONS) {

                const [a, b, c] = combo;

                if (

                    boardState[a] === AI &&
                    boardState[b] === AI &&
                    boardState[c] === AI

                ) {

                    return 10;
                }

            }

            for (const combo of WINNING_COMBINATIONS) {

                const [a, b, c] = combo;

                if (

                    boardState[a] === HUMAN &&
                    boardState[b] === HUMAN &&
                    boardState[c] === HUMAN

                ) {

                    return -10;
                }

            }

            if (isBoardFull()) {

                return 0;
            }

            return null;
        }

        function getBestMove() {

            let bestScore = -Infinity;

            let move = -1;

            for (let i = 0; i < boardState.length; i++) {

                if (boardState[i] === null) {

                    boardState[i] = AI;

                    let score = minimax(boardState, 0, false);

                    boardState[i] = null;

                    if (score > bestScore) {

                        bestScore = score;

                        move = i;
                    }

                }

            }

            return move;
        }

        function restartGame() {

            boardState = Array(9).fill(null);

            currentPlayer = HUMAN;

            isGameActive = true;

            cells.forEach(cell => {

                cell.textContent = '';

                cell.classList.remove('x', 'o', 'taken', 'winning');

            });

            statusDisplay.textContent = 'Your Turn (X)';
        }

    </script>

</body>

</html>
