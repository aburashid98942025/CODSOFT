<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision Caption Generator</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

    <style>
        :root {
            --primary: #6c5ce7;
            --primary-hover: #5649c0;
            --bg-dark: #0f0f13;
            --card-bg: #1e1e24;
            --text-main: #ffffff;
            --text-muted: #b2bec3;
            --success: #00b894;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #a29bfe, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .upload-zone {
            border: 2px dashed var(--primary);
            background: rgba(108, 92, 231, 0.05);
            border-radius: 12px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            background: rgba(108, 92, 231, 0.15);
            border-color: #a29bfe;
        }

        .upload-zone p {
            pointer-events: none;
            font-weight: 500;
        }

        #imageInput {
            display: none;
        }


        .image-preview-container {
            display: none;
            margin-top: 1.5rem;
        }

        #previewImage {
            width: 100%;
            max-height: 350px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            background: #000;
        }


        .status-area {
            margin-top: 1.5rem;
            min-height: 60px;
        }

        .loader {
            display: none;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid var(--primary);
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .result-box {
            display: none;
            background: rgba(0, 0, 0, 0.4);
            border-left: 5px solid var(--success);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--success);
            margin-bottom: 5px;
            display: block;
        }

        .caption-text {
            font-size: 1.2rem;
            line-height: 1.5;
        }

        .confidence-bar {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-bg {
            flex-grow: 1;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 1s ease;
        }

        .percent-text {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="main-card">
        <h1>Vision to Language AI</h1>
        <p class="subtitle">Upload an image to generate a caption</p>

        <div class="upload-zone" id="dropZone">
            <input type="file" id="imageInput" accept="image/*">
            <div id="uploadText">
                <span style="font-size: 2rem;">📷</span>
                <p>Click to upload or drag image here</p>
            </div>
        </div>

        <div class="image-preview-container" id="previewContainer">
            <img id="previewImage" alt="User Upload">
        </div>

        <div class="status-area">
            <div class="loader" id="loader"></div>

            <div class="result-box" id="resultBox">
                <span class="ai-label">AI Generated Caption</span>
                <p class="caption-text" id="captionText">Loading...</p>

                <div class="confidence-bar">
                    <span style="font-size: 0.8rem;">Confidence:</span>
                    <div class="bar-bg">
                        <div class="bar-fill" id="confidenceBar"></div>
                    </div>
                    <span class="percent-text" id="percentText">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script>

        const imageInput = document.getElementById('imageInput');
        const dropZone = document.getElementById('dropZone');
        const previewImage = document.getElementById('previewImage');
        const previewContainer = document.getElementById('previewContainer');
        const uploadText = document.getElementById('uploadText');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('resultBox');
        const captionText = document.getElementById('captionText');
        const confidenceBar = document.getElementById('confidenceBar');
        const percentText = document.getElementById('percentText');

        let model = null;


        async function loadModel() {
            try {
                console.log("Loading model...");
                model = await mobilenet.load();
                console.log("Model loaded successfully!");
            } catch (error) {
                console.error("Error loading model:", error);
                captionText.innerText = "Error loading AI model.";
            }
        }

        loadModel();


        dropZone.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleImage(e.target.files[0]);
            }
        });


        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.background = "rgba(108, 92, 231, 0.2)";
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.background = "rgba(108, 92, 231, 0.05)";
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = "rgba(108, 92, 231, 0.05)";
            if (e.dataTransfer.files.length) {
                handleImage(e.dataTransfer.files[0]);
            }
        });

        function handleImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewContainer.style.display = 'block';
                uploadText.style.display = 'none';
                dropZone.style.border = 'none';


                analyzeImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }


        async function analyzeImage(imageSrc) {

            resultBox.style.display = 'none';
            loader.style.display = 'block';


            const imgElement = new Image();
            imgElement.src = imageSrc;

            imgElement.onload = async () => {
                if (!model) return;


                const predictions = await model.classify(imgElement);

                generateNaturalCaption(predictions);
            };
        }


        function generateNaturalCaption(predictions) {
            loader.style.display = 'none';
            resultBox.style.display = 'block';

            if (predictions.length === 0) {
                captionText.innerText = "I couldn't identify distinct objects in this image.";
                return;
            }


            const top1 = predictions[0];
            const top2 = predictions[1];


            const percentage = Math.round(top1.probability * 100);


            confidenceBar.style.width = `${percentage}%`;
            percentText.innerText = `${percentage}%`;


            let mainObject = top1.className.split(',')[0].replace(/-/g, ' ');
            mainObject = mainObject.charAt(0).toUpperCase() + mainObject.slice(1);

            let sentence = "";

            if (top2 && top2.probability > 0.1) {

                let secondObject = top2.className.split(',')[0].replace(/-/g, ' ');
                sentence = `This image primarily features a ${mainObject}, likely accompanied by a ${secondObject} in the scene.`;
            } else {
                sentence = `The visual analysis suggests this is a ${mainObject}.`;
            }


            const keywords = mainObject.toLowerCase();
            if (keywords.includes('dog')) sentence += " It looks like a domestic scene.";
            else if (keywords.includes('cat')) sentence += " A feline subject is detected.";
            else if (keywords.includes('car') || keywords.includes('bus')) sentence += " Transportation detected.";
            else if (keywords.includes('person')) sentence += " A human presence is identified.";

            captionText.innerText = sentence;
        }
    </script>
</body>

</html>
